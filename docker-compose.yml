services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seo_guardian
      POSTGRES_PASSWORD: seo_guardian
      POSTGRES_DB: seo_guardian
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seo_guardian']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: seo_guardian
      MINIO_ROOT_PASSWORD: seo_guardian_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 seo_guardian seo_guardian_secret &&
      mc mb --ignore-existing local/seo-guardian-uploads &&
      mc mb --ignore-existing local/seo-guardian-html &&
      mc mb --ignore-existing local/seo-guardian-reports
      "

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
  redisdata:
  miniodata:
